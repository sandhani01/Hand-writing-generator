<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0d11" />
    <title>Handwritten Notes Generator | Turn Text into Natural Handwriting</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Convert your digital notes and coding assignments into beautiful, natural-looking handwriting. Export as PDF or create your own custom TrueType fonts." />
    <link rel="canonical" href="https://handwritten-notes.app" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://handwritten-notes.app" />
    <meta property="og:title" content="Handwritten Notes Generator | Digital to Natural" />
    <meta property="og:description" content="Generate realistic handwritten assignments and custom fonts using your own handwriting samples." />
    <meta property="og:image" content="https://handwritten-notes.app/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://handwritten-notes.app" />
    <meta property="twitter:title" content="Handwritten Notes Generator" />
    <meta property="twitter:description" content="Digital notes to natural handwriting in seconds. Custom font generation included." />
    <meta property="twitter:image" content="https://handwritten-notes.app/og-image.jpg" />

    <!-- Security & Referrer -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self' *;" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Handwritten Notes Generator",
        "description": "App to convert text and code into handwritten documents or export custom fonts.",
        "applicationCategory": "EducationApplication",
        "operatingSystem": "All"
      }
    </script>

    <!-- FAQ / AI Citations -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How do I turn digital notes into handwriting?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Upload your handwriting samples to the Font Generator to create a custom font, or use our Theory mode to render digital text into natural-looking handwriting templates."
            }
          },
          {
            "@type": "Question",
            "name": "Can I export my coding assignments as handwriting?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, our specialized Coding Mode supports programming symbols and keeps the indentation of your source code while giving it a realistic handwritten appearance."
            }
          }
        ]
      }
    </script>

    <script>
      (function () {
        try {
          var k = "handwriting-notes-theme";
          var t = localStorage.getItem(k);
          var mode = t === "light" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", mode);
          document.documentElement.style.colorScheme =
            mode === "light" ? "light" : "dark";
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
