services:
  - type: redis
    name: handwritten-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: handwritten-api
    env: python
    rootDir: projects
    buildCommand: pip install -r requirements-production.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: HANDWRITING_AUTH_MODE
        value: supabase
      - key: HANDWRITING_SUPABASE_URL
        sync: false
      - key: HANDWRITING_DATABASE_URL
        sync: false
      - key: HANDWRITING_STORAGE_BACKEND
        value: s3
      - key: HANDWRITING_STORAGE_BUCKET
        sync: false
      - key: HANDWRITING_STORAGE_REGION
        value: auto
      - key: HANDWRITING_STORAGE_ENDPOINT_URL
        sync: false
      - key: HANDWRITING_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: HANDWRITING_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: HANDWRITING_JOB_BACKEND
        value: celery
      - key: HANDWRITING_REDIS_URL
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_CELERY_BROKER_URL
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_CORS_ORIGINS
        sync: false
      - key: HANDWRITING_MAX_ALPHABET_DATASETS
        value: "5"
      - key: HANDWRITING_MAX_CODING_DATASETS
        value: "3"
      - key: HANDWRITING_MAX_BACKGROUNDS
        value: "1"
      - key: HANDWRITING_MAX_SAVED_RENDERS
        value: "3"

  - type: worker
    name: handwritten-worker
    env: python
    rootDir: projects
    buildCommand: pip install -r requirements-production.txt
    startCommand: celery -A backend.celery_app.celery_app worker --loglevel=info
    plan: starter
    envVars:
      - key: HANDWRITING_AUTH_MODE
        value: supabase
      - key: HANDWRITING_SUPABASE_URL
        sync: false
      - key: HANDWRITING_DATABASE_URL
        sync: false
      - key: HANDWRITING_STORAGE_BACKEND
        value: s3
      - key: HANDWRITING_STORAGE_BUCKET
        sync: false
      - key: HANDWRITING_STORAGE_REGION
        value: auto
      - key: HANDWRITING_STORAGE_ENDPOINT_URL
        sync: false
      - key: HANDWRITING_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: HANDWRITING_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: HANDWRITING_JOB_BACKEND
        value: celery
      - key: HANDWRITING_REDIS_URL
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_CELERY_BROKER_URL
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: handwritten-redis
          property: connectionString
      - key: HANDWRITING_MAX_ALPHABET_DATASETS
        value: "5"
      - key: HANDWRITING_MAX_CODING_DATASETS
        value: "3"
      - key: HANDWRITING_MAX_BACKGROUNDS
        value: "1"
      - key: HANDWRITING_MAX_SAVED_RENDERS
        value: "3"

  - type: web
    name: handwritten-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: VITE_API_BASE
        sync: false
      - key: VITE_AUTH_PROVIDER
        value: supabase
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
